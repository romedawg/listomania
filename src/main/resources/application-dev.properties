######################
# APPLICATION SETTINGS
spring.devtools.add-properties=true
spring.devtools.livereload.enabled=true
# Thymeleaf
spring.thymeleaf.cache = false

networkaddress.cache.ttl=10

#FreeMarker
spring.freemarker.cache = false

#Groovy
spring.groovy.template.cache = false
server.port = 8080

# Enable tomcat for jmx metrics
server.tomcat.mbeanregistry.enabled=true
# Enable all endpoints for exporter
management.endpoints.web.exposure.include=*
spring.jmx.enabled = false
management.endpoint.prometheus.enabled=true
#enableLoggingRequestDetails=true

#########
# LOGGING
logging.level.web=INFO
logging.level.org.springframework.web=INFO
logging.level.org.thymeleaf=INFO
logging.level.sql=INFO
logging.level.db=INFO
logging.file.name=/tmp/rome.log

###############
#DB SETTINGS Posgres
spring.jpa.hibernate.ddl-auto=update

# Basic JDBC Connection
#spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DATABASE} // postgres
#spring.datasource.url=jdbc:mysql://${POSTGRES_HOST}:3306/${POSTGRES_DATABASE}?useSSL=false

# Lead Dist - Flag SSL
# This works
#spring.datasource.url=jdbc:mysql://${POSTGRES_HOST}:3306/${POSTGRES_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&verifyServerCertificate=true
spring.datasource.url=jdbc:mysql://${POSTGRES_HOST}:3306/${POSTGRES_DATABASE}?createDatabaseIfNotExist=true

# Aurora Failover Scenarios
#spring.datasource.hikari.data-source-properties.wrapperPlugins: failover
#spring.datasource.driver-class-name=software.amazon.jdbc.Driver
#spring.datasource.url=jdbc:aws-wrapper:mysql://${POSTGRES_HOST}:3306/${POSTGRES_DATABASE}
#spring.datasource.url=jdbc:aws-wrapper:mysql://${POSTGRES_HOST}:3306/${POSTGRES_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&verifyServerCertificate=true

spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# new setting for Aurora migration test
#requireSSL=true

# HikariCP Specific Properties
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=10 
spring.datasource.hikari.max-lifetime=10 
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=RomesHikariPool

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.generate-ddl=true

### TESTING LOGGING - not really working
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

# Disable feature detection by this undocumented parameter. Check the org.hibernate.engine.jdbc.internal.JdbcServiceImpl.configure method for more details.
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Because detection is disabled you have to set correct dialect by hand.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL95Dialect

####################
# Liquibase SETTINGS
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yml
logging.level.liquibase=ERROR
spring.liquibase.driver-class-name=org.postgresql.Driver
spring.liquibase.default-schema=romedawg
spring.liquibase.user=roman
spring.liquibase.password=password
spring.liquibase.liquibase-schema=NOTIFICATION

################
# SLACK Alerting
SLACK_WEBHOOK=${SLACK_WEBHOOK}

################
# Twilio
TWILIO_API_KEY=${TWILIO_API_KEY}
TWILIO_API_TOKEN=${TWILIO_API_TOKEN}
